<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baron's Bracket 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #7ec8e3;
    --deep: #0a2a4a;
    --accent: #00c6ff;
    --gold: #ffd700;
    --win: #00e5a0;
    --text: #e8f4fd;
    --muted: #6fa8c8;
    --card: rgba(14,61,99,0.7);
    --border: rgba(126,200,227,0.3);
    --deuce: #00c6ff;
    --chonker: #ff6b9d;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    background: var(--deep);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,198,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,198,255,0.06) 0%, transparent 60%);
  }
  .wrapper { padding:24px 16px 40px; max-width:1500px; margin:0 auto; }
  header { text-align:center; margin-bottom:20px; }
  .logo-line { display:flex; align-items:center; justify-content:center; gap:12px; margin-bottom:4px; }
  .penguin-icon { font-size:32px; }
  h1 {
    font-family:'Bebas Neue',cursive;
    font-size:clamp(36px,6vw,72px);
    letter-spacing:4px;
    background:linear-gradient(135deg,#fff 0%,var(--accent) 50%,var(--sky) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    line-height:1;
  }
  .subtitle { font-family:'Bebas Neue',cursive; font-size:clamp(14px,2vw,20px); letter-spacing:6px; color:var(--muted); margin-top:6px; }
  .badge { display:inline-block; background:linear-gradient(135deg,var(--accent),var(--sky)); color:var(--deep); font-weight:700; font-size:11px; letter-spacing:1px; padding:4px 12px; border-radius:20px; text-transform:uppercase; margin-top:10px; }

  .legend { display:flex; justify-content:center; align-items:center; gap:20px; margin:10px 0 4px; font-size:12px; }
  .legend-item { display:flex; align-items:center; gap:6px; font-weight:600; }
  .legend-dot { width:10px; height:10px; border-radius:2px; }
  .legend-dot.d { background:var(--deuce); }
  .legend-dot.c { background:var(--chonker); }

  .edit-hint { text-align:center; font-size:10px; color:var(--muted); margin-bottom:12px; opacity:0.8; }
  .scroll-hint { display:none; text-align:center; font-size:11px; color:var(--muted); margin-bottom:8px; }
  @media(max-width:960px){ .scroll-hint{display:block;} }

  .full-bracket { display:flex; align-items:flex-start; overflow-x:auto; padding-bottom:8px; }
  .col { display:flex; flex-direction:column; }
  .col-s16 { width:205px; flex-shrink:0; }
  .col-e8  { width:180px; flex-shrink:0; }
  .col-f4  { width:163px; flex-shrink:0; }
  .col-ch  { width:158px; flex-shrink:0; }
  .col-gap { width:8px; flex-shrink:0; }

  .col-header { font-family:'Bebas Neue',cursive; text-align:center; padding-bottom:12px; }
  .round-num { display:block; font-size:17px; letter-spacing:1px; color:var(--text); line-height:1.1; }
  .round-theme { display:block; font-size:9px; letter-spacing:3px; color:var(--muted); margin-top:2px; }

  .region-label { font-size:9px; letter-spacing:2px; color:var(--muted); font-family:'Bebas Neue',cursive; padding-left:3px; margin-bottom:3px; }

  .matchup { display:flex; flex-direction:column; gap:2px; }
  .vs-div { height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); margin:1px 4px; }

  .team {
    display:flex; align-items:center; gap:5px;
    padding:5px 7px; background:var(--card); border:1px solid var(--border);
    border-radius:6px; min-height:36px; position:relative; transition:border-color 0.15s;
  }
  .team:hover { border-color:rgba(0,198,255,0.4); }
  .team.won { background:rgba(0,229,160,0.1); border-color:var(--win); animation:glow 2s ease-in-out infinite; }
  @keyframes glow { 0%,100%{box-shadow:0 0 6px rgba(0,229,160,0.25);} 50%{box-shadow:0 0 14px rgba(0,229,160,0.5);} }
  .team.won .name-display { color:var(--win); font-weight:700; }

  .seed-num { font-family:'Bebas Neue',cursive; font-size:12px; color:var(--muted); min-width:15px; text-align:right; flex-shrink:0; }

  .name-display { font-size:10.5px; font-weight:500; color:var(--text); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:text; border-radius:3px; padding:1px 3px; transition:background 0.1s; }
  .name-display:hover { background:rgba(255,255,255,0.07); }
  .name-input { font-size:10.5px; font-weight:500; color:var(--text); background:rgba(0,198,255,0.08); border:1px solid var(--accent); border-radius:3px; padding:1px 4px; flex:1; min-width:0; outline:none; font-family:'DM Sans',sans-serif; display:none; }

  .pbadge { font-family:'Bebas Neue',cursive; font-size:9px; letter-spacing:0.5px; padding:2px 5px; border-radius:3px; cursor:pointer; flex-shrink:0; border:1px solid transparent; transition:all 0.15s; user-select:none; }
  .pbadge.d { background:rgba(0,198,255,0.12); color:var(--deuce); border-color:rgba(0,198,255,0.25); }
  .pbadge.d:hover { background:rgba(0,198,255,0.22); }
  .pbadge.c { background:rgba(255,107,157,0.12); color:var(--chonker); border-color:rgba(255,107,157,0.25); }
  .pbadge.c:hover { background:rgba(255,107,157,0.22); }
  .pbadge.tbd { background:rgba(111,168,200,0.08); color:var(--muted); border-color:rgba(111,168,200,0.15); }

  .win-btn { position:absolute; right:-1px; top:50%; transform:translateY(-50%); font-size:8px; font-weight:700; background:rgba(0,229,160,0.15); border:1px solid rgba(0,229,160,0.35); color:var(--win); border-radius:0 5px 5px 0; padding:0 5px; height:100%; cursor:pointer; opacity:0; transition:opacity 0.15s; font-family:'DM Sans',sans-serif; }
  .team:hover .win-btn { opacity:1; }
  .team.won .win-btn { display:none; }

  .trophy-zone { text-align:center; padding:10px 6px; background:linear-gradient(135deg,rgba(255,215,0,0.08),rgba(0,198,255,0.08)); border:1px solid rgba(255,215,0,0.25); border-radius:10px; width:100%; margin-top:6px; }
  .trophy { font-size:24px; display:block; margin-bottom:3px; }
  .champ-name { font-family:'Bebas Neue',cursive; font-size:14px; letter-spacing:1px; color:var(--gold); min-height:18px; }

  .controls { display:flex; justify-content:center; gap:10px; margin-top:22px; flex-wrap:wrap; }
  .btn { padding:9px 20px; border:1px solid var(--border); background:var(--card); color:var(--text); font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; border-radius:8px; cursor:pointer; transition:all 0.15s; }
  .btn:hover { border-color:var(--accent); background:rgba(0,198,255,0.12); }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--sky)); color:var(--deep); border:none; font-weight:700; }
  .btn-primary:hover { opacity:0.9; transform:translateY(-1px); }

  footer-note { display:block; text-align:center; font-size:11px; color:var(--muted); margin-top:14px; }
  .watermark { font-family:'Bebas Neue',cursive; font-size:11px; letter-spacing:2px; color:rgba(126,200,227,0.15); text-align:center; margin-top:6px; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo-line">
      <span class="penguin-icon">🐧</span>
      <h1>BARON'S BRACKET</h1>
      <span class="penguin-icon">🐧</span>
    </div>
    <div class="subtitle">2026 • Best Deck in Vibes</div>
    <div><span class="badge">Deuce vs Chonker — Players assigned per round</span></div>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot d"></div><span style="color:var(--deuce)">Deuce</span></div>
    <div class="legend-item"><div class="legend-dot c"></div><span style="color:var(--chonker)">Chonker</span></div>
  </div>
  <p class="edit-hint">Click name to rename &nbsp;|&nbsp; Click player badge to swap &nbsp;|&nbsp; Hover + WIN to advance</p>
  <p class="scroll-hint">← scroll to see full bracket →</p>

  <div id="root"></div>

  <div class="controls">
    <button class="btn" onclick="resetAll()">↺ Reset All</button>
    <button class="btn" onclick="reshuffleRound('s16')">🎲 Reshuffle Round of 16</button>
    <button class="btn" onclick="reshuffleAll()">🎲 Reshuffle All Rounds</button>
    <button class="btn btn-primary" onclick="share()">📤 Share</button>
  </div>

  <footer-note>Randomly seeded | vibes-tracker.com</footer-note>
  <div class="watermark">BARON'S BRACKET 2026 • VIBES TCG</div>
</div>

<script>
// 16 decks — fresh random seeding
const TEAMS = [
  {id:1,  seed:1,  name:"GMP Colosseum"},
  {id:2,  seed:2,  name:"Redurple Midrange"},
  {id:3,  seed:3,  name:"Drop of Attention"},
  {id:4,  seed:4,  name:"Blue Mill"},
  {id:5,  seed:5,  name:"Red Tower"},
  {id:6,  seed:6,  name:"GMP Caffeine"},
  {id:7,  seed:7,  name:"Purple Recycler"},
  {id:8,  seed:8,  name:"BizBunk"},
  {id:9,  seed:9,  name:"Bashglobe"},
  {id:10, seed:10, name:"Bellyacher"},
  {id:11, seed:11, name:"Bellyacher Toolbox"},
  {id:12, seed:12, name:"BellyBomb"},
  {id:13, seed:13, name:"Yellow Vibe Ramp"},
  {id:14, seed:14, name:"Green Starter"},
  {id:15, seed:15, name:"Yellow Starter"},
  {id:16, seed:16, name:"Yellow Yum Yum"},
];

// Standard bracket matchup order: 1v16, 8v9 | 4v13, 5v12 | 3v14, 6v11 | 2v15, 7v10
const S16 = [[1,16],[8,9],[4,13],[5,12],[3,14],[6,11],[2,15],[7,10]];

// picks[round][matchIdx] = winning team id or null
let picks = {s16:Array(8).fill(null), e8:Array(4).fill(null), f4:Array(2).fill(null), champ:null};

// matchPlayers[round-idx] = ['Deuce','Chonker'] or ['Chonker','Deuce']
// index 0 = top slot, index 1 = bottom slot
let matchPlayers = {};

const ROUNDS = ['s16','e8','f4','champ'];
const ROUND_SIZE = {s16:8, e8:4, f4:2, champ:1};

function randomAssign() { return Math.random()<0.5 ? ['Deuce','Chonker'] : ['Chonker','Deuce']; }

function initAllPlayers() {
  ROUNDS.forEach(r => {
    for (let i=0; i<ROUND_SIZE[r]; i++) {
      matchPlayers[r+'-'+i] = randomAssign();
    }
  });
}

function reshuffleRound(round) {
  for (let i=0; i<ROUND_SIZE[round]; i++) {
    matchPlayers[round+'-'+i] = randomAssign();
  }
  render();
}

function reshuffleAll() {
  initAllPlayers();
  render();
}

function getPlayer(round, idx, slot) {
  const key = round+'-'+idx;
  return matchPlayers[key] ? matchPlayers[key][slot] : 'TBD';
}

function toggleMatchPlayer(round, idx) {
  const key = round+'-'+idx;
  if (matchPlayers[key]) {
    matchPlayers[key] = [matchPlayers[key][1], matchPlayers[key][0]];
    render();
  }
}

// Team helpers
const gt = id => TEAMS.find(t=>t.id===id);
const gs = seed => TEAMS.find(t=>t.seed===seed);

function getMatch(round, idx) {
  if (round==='s16') { const [a,b]=S16[idx]; return [gs(a),gs(b)]; }
  if (round==='e8')  { const i=idx*2; return [picks.s16[i]?gt(picks.s16[i]):null, picks.s16[i+1]?gt(picks.s16[i+1]):null]; }
  if (round==='f4')  { const i=idx*2; return [picks.e8[i]?gt(picks.e8[i]):null,   picks.e8[i+1]?gt(picks.e8[i+1]):null]; }
  if (round==='champ') return [picks.f4[0]?gt(picks.f4[0]):null, picks.f4[1]?gt(picks.f4[1]):null];
  return [null,null];
}

function isWon(team, round, idx) {
  if (round==='s16')  return picks.s16[idx]===team.id;
  if (round==='e8')   return picks.e8[idx]===team.id;
  if (round==='f4')   return picks.f4[idx]===team.id;
  if (round==='champ')return picks.champ===team.id;
  return false;
}

function advance(round, idx, slot) {
  const [t1,t2] = getMatch(round,idx);
  const chosen = slot===0?t1:t2;
  if (!chosen) return;
  if (round==='s16') {
    picks.s16[idx]=chosen.id;
    const ei=Math.floor(idx/2);
    const other=picks.s16[idx%2===0?idx+1:idx-1];
    if (picks.e8[ei] && picks.e8[ei]!==chosen.id && picks.e8[ei]!==other) { picks.e8[ei]=null; clearDown('e8',ei); }
  } else if (round==='e8') {
    picks.e8[idx]=chosen.id;
    const fi=Math.floor(idx/2);
    if (picks.f4[fi] && picks.f4[fi]!==chosen.id) { picks.f4[fi]=null; clearDown('f4',fi); }
  } else if (round==='f4') {
    picks.f4[idx]=chosen.id;
    if (picks.champ && picks.champ!==chosen.id) picks.champ=null;
  } else if (round==='champ') {
    picks.champ=chosen.id;
  }
  render();
}

function clearDown(round, idx) {
  if (round==='e8') { picks.e8[idx]=null; clearDown('f4',Math.floor(idx/2)); }
  if (round==='f4') { picks.f4[idx]=null; picks.champ=null; }
}

// Name editing
function startEdit(id) {
  const nd=document.getElementById('nd'+id), ni=document.getElementById('ni'+id);
  if(!nd||!ni)return;
  nd.style.display='none'; ni.style.display='block';
  ni.value=gt(id)?.name||''; ni.focus(); ni.select();
}
function finishEdit(id) {
  const t=gt(id), ni=document.getElementById('ni'+id);
  if(!t||!ni)return;
  const v=ni.value.trim(); if(v) t.name=v;
  render();
}

// Rendering
function teamRow(team, round, idx, slot) {
  const player = getPlayer(round, idx, slot);
  const pc = player==='Deuce'?'d' : player==='Chonker'?'c':'tbd';

  if (!team) return `<div class="team">
    <span class="seed-num">-</span>
    <span class="name-display" style="color:var(--muted)">TBD</span>
    <span class="pbadge ${pc}" onclick="toggleMatchPlayer('${round}',${idx})">${player}</span>
  </div>`;

  const won = isWon(team, round, idx);
  return `<div class="team ${won?'won':''}">
    <span class="seed-num">${team.seed}</span>
    <span id="nd${team.id}" class="name-display" onclick="startEdit(${team.id})">${team.name}</span>
    <input id="ni${team.id}" class="name-input" onblur="finishEdit(${team.id})" onkeydown="if(event.key==='Enter')finishEdit(${team.id})" />
    <span class="pbadge ${pc}" onclick="toggleMatchPlayer('${round}',${idx})">${player}</span>
    ${!won?`<button class="win-btn" onclick="advance('${round}',${idx},${slot})">WIN</button>`:''}
  </div>`;
}

function matchup(round, idx) {
  const [t1,t2]=getMatch(round,idx);
  return `<div class="matchup">
    ${teamRow(t1,round,idx,0)}
    <div class="vs-div"></div>
    ${teamRow(t2,round,idx,1)}
  </div>`;
}

function hdr(big, sub, gold) {
  const gc = gold?'color:var(--gold);':'';
  const sc = gold?'color:rgba(255,215,0,0.5);':'';
  return `<div class="col-header"><span class="round-num" style="${gc}">${big}</span><span class="round-theme" style="${sc}">${sub}</span></div>`;
}

function rl(t) { return `<div class="region-label">${t}</div>`; }

function render() {
  const ct = picks.champ?gt(picks.champ):null;
  const champPlayer = ct ? getPlayer('champ',0, picks.f4[0]===ct.id?0:1) : null;
  const cc = champPlayer==='Deuce'?'var(--deuce)': champPlayer==='Chonker'?'var(--chonker)':'var(--gold)';

  document.getElementById('root').innerHTML = `<div class="full-bracket">

  <div class="col col-s16">
    ${hdr('Sweet 16','Enter the Huddle',false)}
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>${rl('REGION A')}${matchup('s16',0)}<div style="height:6px"></div>${matchup('s16',1)}</div>
      <div style="height:14px"></div>
      <div>${rl('REGION B')}${matchup('s16',2)}<div style="height:6px"></div>${matchup('s16',3)}</div>
    </div>
  </div>

  <div class="col-gap"></div>

  <div class="col col-e8">
    ${hdr('Elite 8','Legend of the Lils',false)}
    <div style="display:flex;flex-direction:column;gap:14px;padding-top:36px;">
      ${matchup('e8',0)}<div style="height:48px"></div>${matchup('e8',1)}
    </div>
  </div>

  <div class="col-gap"></div>

  <div class="col col-f4">
    ${hdr('Final Four','The Frozen Four',false)}
    <div style="padding-top:94px;">${matchup('f4',0)}</div>
  </div>

  <div class="col-gap"></div>

  <div class="col col-ch">
    ${hdr('Championship','Vibe Check',true)}
    <div style="display:flex;flex-direction:column;align-items:center;padding-top:132px;gap:6px;">
      ${matchup('champ',0)}
      <div class="trophy-zone">
        <span class="trophy">🏆</span>
        <div class="champ-name" style="color:${cc}">${ct?ct.name:'???'}</div>
        ${ct?`<div style="font-size:10px;color:${cc};letter-spacing:1px;font-family:'Bebas Neue',cursive;margin-top:1px;">${champPlayer}</div>`:''}
        <div style="font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px;">CHAMPION</div>
      </div>
    </div>
  </div>

  <div class="col-gap"></div>

  <div class="col col-f4">
    ${hdr('Final Four','The Frozen Four',false)}
    <div style="padding-top:94px;">${matchup('f4',1)}</div>
  </div>

  <div class="col-gap"></div>

  <div class="col col-e8">
    ${hdr('Elite 8','Legend of the Lils',false)}
    <div style="display:flex;flex-direction:column;gap:14px;padding-top:36px;">
      ${matchup('e8',2)}<div style="height:48px"></div>${matchup('e8',3)}
    </div>
  </div>

  <div class="col-gap"></div>

  <div class="col col-s16">
    ${hdr('Sweet 16','Enter the Huddle',false)}
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div>${rl('REGION C')}${matchup('s16',4)}<div style="height:6px"></div>${matchup('s16',5)}</div>
      <div style="height:14px"></div>
      <div>${rl('REGION D')}${matchup('s16',6)}<div style="height:6px"></div>${matchup('s16',7)}</div>
    </div>
  </div>

  </div>`;
}

function resetAll() {
  picks={s16:Array(8).fill(null),e8:Array(4).fill(null),f4:Array(2).fill(null),champ:null};
  initAllPlayers();
  render();
}

function share() {
  const ct=picks.champ?gt(picks.champ):null;
  const champPlayer = ct ? getPlayer('champ',0, picks.f4[0]===ct.id?0:1) : null;
  const f4=picks.f4.map(id=>id?gt(id)?.name:'?').join(' vs ');
  let msg="🐧 Baron's Bracket 2026 — Vibes TCG\n\n";
  if(ct) msg+=`🏆 Champion: ${ct.name} (${champPlayer})\n`;
  if(f4!=='? vs ?') msg+=`Frozen Four: ${f4}\n`;
  msg+='\nvibes-tracker.com • @DeuceTCGs';
  if(navigator.share){navigator.share({title:"Baron's Bracket",text:msg});}
  else{navigator.clipboard.writeText(msg).then(()=>alert('Copied to clipboard!'));}
}

// Init
initAllPlayers();
render();
</script>
</body>
</html>
