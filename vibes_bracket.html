<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibes TCG March Madness 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ice: #d6f0ff;
    --sky: #7ec8e3;
    --deep: #0a2a4a;
    --mid: #0e3d63;
    --accent: #00c6ff;
    --gold: #ffd700;
    --win: #00e5a0;
    --text: #e8f4fd;
    --muted: #6fa8c8;
    --card: rgba(14, 61, 99, 0.7);
    --border: rgba(126, 200, 227, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--deep);
    font-family: 'DM Sans', sans-serif;
    color: var(--text);
    min-height: 100vh;
    overflow-x: auto;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(0,198,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 80%, rgba(0,198,255,0.06) 0%, transparent 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.02'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  .wrapper {
    padding: 24px 16px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  header {
    text-align: center;
    margin-bottom: 32px;
  }

  .logo-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    margin-bottom: 4px;
  }

  .penguin-icon {
    font-size: 32px;
  }

  h1 {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(36px, 6vw, 72px);
    letter-spacing: 4px;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, var(--sky) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }

  .subtitle {
    font-family: 'Bebas Neue', cursive;
    font-size: clamp(14px, 2vw, 20px);
    letter-spacing: 6px;
    color: var(--muted);
    margin-top: 6px;
  }

  .badge {
    display: inline-block;
    background: linear-gradient(135deg, var(--accent), var(--sky));
    color: var(--deep);
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 4px 12px;
    border-radius: 20px;
    text-transform: uppercase;
    margin-top: 10px;
  }

  .bracket-container {
    display: grid;
    grid-template-columns: 1fr 80px 80px 120px 80px 80px 1fr;
    grid-template-rows: auto;
    gap: 0;
    align-items: center;
    min-width: 900px;
  }

  /* Round labels */
  .round-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 13px;
    letter-spacing: 3px;
    color: var(--muted);
    text-align: center;
    padding: 8px 0 16px;
    text-transform: uppercase;
  }

  /* Matchup blocks */
  .region {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .matchup {
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
  }

  .team {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s ease;
    min-height: 36px;
    backdrop-filter: blur(4px);
  }

  .team:hover {
    border-color: var(--accent);
    background: rgba(0,198,255,0.12);
    transform: translateX(2px);
  }

  .team.winner {
    background: rgba(0,229,160,0.15);
    border-color: var(--win);
  }

  .team.winner .team-name {
    color: var(--win);
    font-weight: 700;
  }

  .team.left-side:hover {
    transform: translateX(2px);
  }
  .team.right-side:hover {
    transform: translateX(-2px);
  }

  .seed {
    font-family: 'Bebas Neue', cursive;
    font-size: 14px;
    color: var(--muted);
    min-width: 18px;
    text-align: right;
  }

  .seed.s1 { color: var(--gold); }
  .seed.s2 { color: #c0c0c0; }
  .seed.s3 { color: #cd7f32; }
  .seed.s4, .seed.s5 { color: var(--sky); }

  .team-name {
    font-size: 11.5px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 2px 6px;
  }

  /* Connector lines */
  .connectors-left, .connectors-right, .connectors-l2, .connectors-r2 {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    height: 100%;
  }

  /* Final Four and Championship columns */
  .col-left-e8, .col-right-e8 {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .championship-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .champ-label {
    font-family: 'Bebas Neue', cursive;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--gold);
    text-align: center;
    text-transform: uppercase;
  }

  .trophy-zone {
    text-align: center;
    padding: 12px 8px;
    background: linear-gradient(135deg, rgba(255,215,0,0.1), rgba(0,198,255,0.1));
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 12px;
  }

  .trophy {
    font-size: 28px;
    display: block;
    margin-bottom: 4px;
  }

  /* Full layout */
  .full-bracket {
    display: flex;
    gap: 0;
    align-items: flex-start;
    overflow-x: auto;
    padding-bottom: 8px;
  }

  .col {
    display: flex;
    flex-direction: column;
  }

  /* Left side */
  .col-s16-left {
    width: 180px;
    flex-shrink: 0;
  }

  .col-e8-left {
    width: 160px;
    flex-shrink: 0;
  }

  .col-f4-left {
    width: 150px;
    flex-shrink: 0;
  }

  .col-champ {
    width: 140px;
    flex-shrink: 0;
  }

  .col-f4-right {
    width: 150px;
    flex-shrink: 0;
  }

  .col-e8-right {
    width: 160px;
    flex-shrink: 0;
  }

  .col-s16-right {
    width: 180px;
    flex-shrink: 0;
  }

  /* connector column */
  .col-conn {
    width: 24px;
    flex-shrink: 0;
    position: relative;
  }

  /* Regions - each has 2 matchups, spaced vertically */
  .region-block {
    display: flex;
    flex-direction: column;
  }

  .region-spacer {
    flex: 1;
  }

  /* Round column headers */
  .col-header {
    font-family: 'Bebas Neue', cursive;
    font-size: 12px;
    letter-spacing: 3px;
    color: var(--muted);
    text-align: center;
    padding-bottom: 12px;
    text-transform: uppercase;
    white-space: nowrap;
  }

  .col-header .round-num {
    display: block;
    font-size: 18px;
    letter-spacing: 1px;
    color: var(--text);
    line-height: 1.1;
  }

  .col-header .round-theme {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* SVG connectors */
  .conn-svg {
    width: 24px;
    overflow: visible;
  }

  /* Reset button */
  .controls {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 24px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 10px 24px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.5px;
  }

  .btn:hover {
    border-color: var(--accent);
    background: rgba(0,198,255,0.15);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--sky));
    color: var(--deep);
    border: none;
    font-weight: 700;
  }

  .btn-primary:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  footer-note {
    display: block;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-top: 16px;
    letter-spacing: 0.5px;
  }

  /* Mobile hint */
  .scroll-hint {
    display: none;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  @media (max-width: 960px) {
    .scroll-hint { display: block; }
  }

  /* Winner glow */
  @keyframes winGlow {
    0%, 100% { box-shadow: 0 0 8px rgba(0,229,160,0.3); }
    50% { box-shadow: 0 0 16px rgba(0,229,160,0.6); }
  }
  .team.winner { animation: winGlow 2s ease-in-out infinite; }

  /* Champ reveal */
  .champ-name {
    font-family: 'Bebas Neue', cursive;
    font-size: 18px;
    letter-spacing: 2px;
    color: var(--gold);
    min-height: 24px;
    text-align: center;
  }

  .vs-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 1px 4px;
  }

  .watermark {
    font-family: 'Bebas Neue', cursive;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(126, 200, 227, 0.2);
    text-align: center;
    margin-top: 8px;
  }
</style>
</head>
<body>
<div class="wrapper">

  <header>
    <div class="logo-line">
      <span class="penguin-icon">🐧</span>
      <h1>BARON'S BRACKET</h1>
      <span class="penguin-icon">🐧</span>
    </div>
    <div class="subtitle">2026 • Best Deck in Vibes</div>
    <div><span class="badge">Enter the Huddle — Click to Advance Your Picks</span></div>
  </header>

  <p class="scroll-hint">← scroll to see full bracket →</p>

  <div id="bracket-root"></div>

  <div class="controls">
    <button class="btn" onclick="resetBracket()">↺ Reset</button>
    <button class="btn btn-primary" onclick="sharePrompt()">📤 Share Your Bracket</button>
  </div>

  <footer-note>Seeded by tournament performance | vibes-tracker.com</footer-note>
  <div class="watermark">BARON'S BRACKET 2026 • VIBES TCG</div>

</div>

<script>
const NAMES = [
  "BizBunk",
  "Bellyacher Toolbox",
  "Red Tower",
  "BellyBomb",
  "Yellow Yum Yum",
  "Bellyacher",
  "GMP Caffeine",
  "Bashglobe",
  "Drop of Attention",
  "Blue Mill",
  "Yellow Vibe Ramp",
  "GMP Colosseum",
  "Redurple Midrange",
  "Purple Midrange",
  "Green Starter",
  "Yellow Starter",
];

// Fisher-Yates shuffle for random seedings
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const shuffled = shuffle(NAMES);
const TEAMS = shuffled.map((name, i) => ({ id: i + 1, seed: i + 1, name }));

// Sweet 16 matchups (seed vs seed), standard bracket pairing
// Left bracket: regions A and B (seeds 1,16,8,9 | 4,13,5,12)
// Right bracket: regions C and D (seeds 2,15,7,10 | 3,14,6,11)
const S16 = [
  [1,16],[8,9],   // Region A
  [4,13],[5,12],  // Region B
  [3,14],[6,11],  // Region C
  [2,15],[7,10],  // Region D
];

// State: picks per round
// rounds: s16 (8 winners), e8 (4 winners), f4 (2 winners), champ (1 winner)
let picks = {
  s16: Array(8).fill(null),
  e8:  Array(4).fill(null),
  f4:  Array(2).fill(null),
  champ: null
};

function getTeam(id) { return TEAMS.find(t => t.id === id); }

function seedClass(s) {
  if (s === 1) return 's1';
  if (s === 2) return 's2';
  if (s === 3) return 's3';
  if (s <= 5)  return 's4 s5';
  return '';
}

function teamHTML(team, round, matchIdx, slot, side) {
  if (!team) return `<div class="team ${side}-side"><span class="seed">-</span><span class="team-name" style="color:var(--muted)">TBD</span></div>`;
  const isWinner = isPickedWinner(team, round, matchIdx);
  return `<div class="team ${side}-side ${isWinner ? 'winner' : ''}" 
               onclick="pick('${round}',${matchIdx},${slot})"
               title="${team.name}">
    <span class="seed ${seedClass(team.seed)}">${team.seed}</span>
    <span class="team-name">${team.name}</span>
  </div>`;
}

function isPickedWinner(team, round, matchIdx) {
  if (round === 's16') return picks.s16[matchIdx] === team.id;
  if (round === 'e8')  return picks.e8[matchIdx] === team.id;
  if (round === 'f4')  return picks.f4[matchIdx] === team.id;
  if (round === 'champ') return picks.champ === team.id;
  return false;
}

function pick(round, matchIdx, slot) {
  const match = getMatchTeams(round, matchIdx);
  const chosen = match[slot];
  if (!chosen) return;

  if (round === 's16') {
    picks.s16[matchIdx] = chosen.id;
    // Clear downstream if this e8 slot changes
    const e8idx = Math.floor(matchIdx / 2);
    const prev = picks.e8[e8idx];
    const m0 = matchIdx % 2 === 0 ? chosen.id : picks.s16[matchIdx - 1];
    const m1 = matchIdx % 2 === 1 ? chosen.id : picks.s16[matchIdx + 1];
    if (prev && prev !== m0 && prev !== m1) { picks.e8[e8idx] = null; clearDownstream('e8', e8idx); }
  }
  else if (round === 'e8') {
    picks.e8[matchIdx] = chosen.id;
    const f4idx = Math.floor(matchIdx / 2);
    const prev = picks.f4[f4idx];
    if (prev && prev !== chosen.id) { picks.f4[f4idx] = null; clearDownstream('f4', f4idx); }
  }
  else if (round === 'f4') {
    picks.f4[matchIdx] = chosen.id;
    if (picks.champ && picks.champ !== chosen.id) picks.champ = null;
  }
  else if (round === 'champ') {
    picks.champ = chosen.id;
  }

  render();
}

function clearDownstream(round, idx) {
  if (round === 'e8') { picks.e8[idx] = null; clearDownstream('f4', Math.floor(idx/2)); }
  if (round === 'f4') { picks.f4[idx] = null; picks.champ = null; }
}

function getMatchTeams(round, matchIdx) {
  if (round === 's16') {
    const [a, b] = S16[matchIdx];
    return [getTeam(a), getTeam(b)];
  }
  if (round === 'e8') {
    // e8 matchup from s16 winners: pairs (0,1), (2,3), (4,5), (6,7)
    const i0 = matchIdx * 2, i1 = i0 + 1;
    const a = picks.s16[i0] ? getTeam(picks.s16[i0]) : null;
    const b = picks.s16[i1] ? getTeam(picks.s16[i1]) : null;
    return [a, b];
  }
  if (round === 'f4') {
    const i0 = matchIdx * 2, i1 = i0 + 1;
    const a = picks.e8[i0] ? getTeam(picks.e8[i0]) : null;
    const b = picks.e8[i1] ? getTeam(picks.e8[i1]) : null;
    return [a, b];
  }
  if (round === 'champ') {
    const a = picks.f4[0] ? getTeam(picks.f4[0]) : null;
    const b = picks.f4[1] ? getTeam(picks.f4[1]) : null;
    return [a, b];
  }
  return [null, null];
}

function matchupBlock(round, idx, side) {
  const [t1, t2] = getMatchTeams(round, idx);
  return `<div class="matchup">
    ${teamHTML(t1, round, idx, 0, side)}
    <div class="vs-divider"></div>
    ${teamHTML(t2, round, idx, 1, side)}
  </div>`;
}

function render() {
  const champTeam = picks.champ ? getTeam(picks.champ) : null;

  const html = `
  <div class="full-bracket">
    <!-- LEFT: S16 Region A+B -->
    <div class="col col-s16-left">
      <div class="col-header"><span class="round-num">Sweet 16</span><span class="round-theme">Enter the Huddle</span></div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <!-- Region A -->
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="font-size:10px;letter-spacing:2px;color:var(--muted);font-family:'Bebas Neue',cursive;padding-left:4px;">REGION A</div>
          ${matchupBlock('s16', 0, 'left')}
          ${matchupBlock('s16', 1, 'left')}
        </div>
        <div style="height:24px;"></div>
        <!-- Region B -->
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="font-size:10px;letter-spacing:2px;color:var(--muted);font-family:'Bebas Neue',cursive;padding-left:4px;">REGION B</div>
          ${matchupBlock('s16', 2, 'left')}
          ${matchupBlock('s16', 3, 'left')}
        </div>
      </div>
    </div>

    <!-- connector -->
    <div style="width:8px;"></div>

    <!-- LEFT: Legend of the Lils A+B -->
    <div class="col col-e8-left">
      <div class="col-header"><span class="round-num">Elite 8</span><span class="round-theme">Legend of the Lils</span></div>
      <div style="display:flex;flex-direction:column;gap:16px;padding-top:40px;">
        ${matchupBlock('e8', 0, 'left')}
        <div style="height:52px;"></div>
        ${matchupBlock('e8', 1, 'left')}
      </div>
    </div>

    <div style="width:8px;"></div>

    <!-- LEFT: Frozen Four -->
    <div class="col col-f4-left">
      <div class="col-header"><span class="round-num">Final Four</span><span class="round-theme">The Frozen Four</span></div>
      <div style="display:flex;flex-direction:column;padding-top:100px;">
        ${matchupBlock('f4', 0, 'left')}
      </div>
    </div>

    <div style="width:8px;"></div>

    <!-- CHAMPIONSHIP CENTER -->
    <div class="col col-champ">
      <div class="col-header" style="color:var(--gold);font-size:13px;"><span class="round-num" style="color:var(--gold);">Championship</span><span class="round-theme" style="color:rgba(255,215,0,0.6);">Vibe Check</span></div>
      <div style="display:flex;flex-direction:column;align-items:center;padding-top:140px;gap:8px;">
        ${matchupBlock('champ', 0, 'left')}
        <div class="trophy-zone" style="width:100%;margin-top:8px;">
          <span class="trophy">🏆</span>
          <div class="champ-name">${champTeam ? champTeam.name : '???'}</div>
          <div style="font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px;">CHAMPION</div>
        </div>
      </div>
    </div>

    <div style="width:8px;"></div>

    <!-- RIGHT: Frozen Four -->
    <div class="col col-f4-right">
      <div class="col-header"><span class="round-num">Final Four</span><span class="round-theme">The Frozen Four</span></div>
      <div style="display:flex;flex-direction:column;padding-top:100px;">
        ${matchupBlock('f4', 1, 'right')}
      </div>
    </div>

    <div style="width:8px;"></div>

    <!-- RIGHT: Legend of the Lils C+D -->
    <div class="col col-e8-right">
      <div class="col-header"><span class="round-num">Elite 8</span><span class="round-theme">Legend of the Lils</span></div>
      <div style="display:flex;flex-direction:column;gap:16px;padding-top:40px;">
        ${matchupBlock('e8', 2, 'right')}
        <div style="height:52px;"></div>
        ${matchupBlock('e8', 3, 'right')}
      </div>
    </div>

    <div style="width:8px;"></div>

    <!-- RIGHT: Enter the Huddle Region C+D -->
    <div class="col col-s16-right">
      <div class="col-header"><span class="round-num">Sweet 16</span><span class="round-theme">Enter the Huddle</span></div>
      <div style="display:flex;flex-direction:column;gap:16px;">
        <!-- Region C -->
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="font-size:10px;letter-spacing:2px;color:var(--muted);font-family:'Bebas Neue',cursive;padding-left:4px;">REGION C</div>
          ${matchupBlock('s16', 4, 'right')}
          ${matchupBlock('s16', 5, 'right')}
        </div>
        <div style="height:24px;"></div>
        <!-- Region D -->
        <div style="display:flex;flex-direction:column;gap:6px;">
          <div style="font-size:10px;letter-spacing:2px;color:var(--muted);font-family:'Bebas Neue',cursive;padding-left:4px;">REGION D</div>
          ${matchupBlock('s16', 6, 'right')}
          ${matchupBlock('s16', 7, 'right')}
        </div>
      </div>
    </div>
  </div>
  `;

  document.getElementById('bracket-root').innerHTML = html;
}

function resetBracket() {
  picks = { s16: Array(8).fill(null), e8: Array(4).fill(null), f4: Array(2).fill(null), champ: null };
  render();
}

function sharePrompt() {
  const champ = picks.champ ? getTeam(picks.champ) : null;
  const f4 = picks.f4.map(id => id ? getTeam(id)?.name : '?').join(' vs ');
  let msg = '🐧 My Vibes TCG March Madness picks:\n\n';
  if (champ) msg += `🏆 Champion: ${champ.name}\n`;
  if (f4 !== '? vs ?') msg += `Final Four: ${f4}\n`;
  msg += '\nFill out yours 👇\nvibes-tracker.com • @DeuceTCGs';
  if (navigator.share) {
    navigator.share({ title: 'Vibes TCG March Madness', text: msg });
  } else {
    navigator.clipboard.writeText(msg).then(() => alert('Bracket copied to clipboard! Paste it to Twitter.'));
  }
}

render();
</script>
</body>
</html>
